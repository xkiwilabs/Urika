name: CI

# Runs on `dev` only. Tests are intentionally excluded from `main` (the
# public release branch) by the pre-push hook in dev/scripts/setup-hooks.sh,
# so a CI run on main would have nothing meaningful to test against.
# Anything released to main has already passed CI on dev — the
# release-to-main.sh script is a deterministic file copy, not a build.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

# Cancel in-flight CI runs when a new commit is pushed to the same branch.
# Saves CI minutes when several commits land in quick succession.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the rest of the matrix on a single OS failure —
      # we want to see whether the bug is platform-specific.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tooling
        # The `dev` extra pulls in `all` -> `dl` (torch, transformers).
        # Skip the heavy DL extras in CI — no tests need them and they
        # roughly double install time.
        # ``pexpect`` is Linux/macOS-only (Windows raises ImportError on
        # import). The smoke-REPL tests already gate themselves with
        # ``pytest.mark.skipif(pexpect is None, ...)`` so the Windows
        # job will skip them rather than fail.
        run: pip install -e . pytest pytest-asyncio pytest-timeout pyperclip ruff

      # Lint only needs to run once — ubuntu+py3.12 is the canonical
      # gate. Skipping on the other 5 jobs saves ~5 seconds each.
      - name: Ruff check
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: ruff check src/ tests/

      - name: Pytest (Linux / macOS)
        if: matrix.os != 'windows-latest'
        # ``-m "not integration"`` excludes the smoke harnesses
        # (test_smoke_open: real LLM calls; test_smoke_dashboard:
        # needs Playwright + chromium; test_smoke_repl: needs pexpect)
        # — these are designed for manual / dedicated runs, not the
        # per-PR gate. The rest of the suite (~2870 tests) covers
        # the actual code paths and runs in <30s per OS.
        #
        # ``--timeout=300`` (via pytest-timeout) kills any single
        # test that hangs >5min instead of stalling the whole run.
        # Most tests are sub-second; the high ceiling exists for the
        # few notification / SMTP tests that legitimately take ~60s
        # on macOS (slow DNS / connection refused retry) — earlier
        # ``--timeout=60`` killed those mid-flight even though they
        # were making honest progress.
        run: pytest -q -m "not integration" --timeout=300

      - name: Pytest (Windows — diagnostic verbose mode)
        if: matrix.os == 'windows-latest'
        # DIAGNOSTIC RUN — temporary. The Windows job has been
        # hanging for several CI cycles: ~330 tests pass in 13s,
        # then test #331 starts a non-daemon thread that won't
        # terminate, and the run wedges for 5min until pytest-
        # timeout fires. With ``-q`` we can't see which test is
        # #331, so this run uses ``-v`` (test names), ``-x`` (stop
        # at first failure / interrupt), and ``--timeout=30`` to
        # fail-fast. Once we have the test name from the logs,
        # revert this block and replace the current ``-q``/``-x``
        # combo with the same line as Linux/macOS plus a single
        # targeted fix at the offending test.
        run: pytest -v -x -m "not integration" --timeout=30
