name: CI

# Runs on `dev` only. Tests are intentionally excluded from `main` (the
# public release branch) by the pre-push hook in dev/scripts/setup-hooks.sh,
# so a CI run on main would have nothing meaningful to test against.
# Anything released to main has already passed CI on dev — the
# release-to-main.sh script is a deterministic file copy, not a build.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

# Cancel in-flight CI runs when a new commit is pushed to the same branch.
# Saves CI minutes when several commits land in quick succession.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the rest of the matrix on a single OS failure —
      # we want to see whether the bug is platform-specific.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tooling
        # The `dev` extra pulls in `all` -> `dl` (torch, transformers).
        # Skip the heavy DL extras in CI — no tests need them and they
        # roughly double install time.
        # ``pexpect`` is Linux/macOS-only (Windows raises ImportError on
        # import). The smoke-REPL tests already gate themselves with
        # ``pytest.mark.skipif(pexpect is None, ...)`` so the Windows
        # job will skip them rather than fail.
        run: pip install -e . pytest pytest-asyncio pytest-timeout pyperclip ruff

      # Lint only needs to run once — ubuntu+py3.12 is the canonical
      # gate. Skipping on the other 5 jobs saves ~5 seconds each.
      - name: Ruff check
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: ruff check src/ tests/

      - name: Pytest
        # ``-m "not integration"`` excludes the smoke harnesses
        # (test_smoke_open: real LLM calls; test_smoke_dashboard:
        # needs Playwright + chromium; test_smoke_repl: needs pexpect)
        # — these are designed for manual / dedicated runs, not the
        # per-PR gate. The rest of the suite (~2870 tests) covers
        # the actual code paths and runs in <30s per OS.
        #
        # ``--timeout=60`` (via pytest-timeout, already in [dev])
        # kills any single test that hangs >60s instead of stalling
        # the whole run. Critical on Windows where occasional SSL or
        # threading cleanup hangs would otherwise interrupt the
        # entire pytest process via KeyboardInterrupt mid-suite, even
        # though only one test was actually stuck.
        run: pytest -q -m "not integration" --timeout=60
