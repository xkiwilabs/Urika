name: E2E smoke (real API)

# Real end-to-end smoke against the Anthropic API. Unlike the unit
# matrix in ci.yml (everything mocked at the SDK boundary), this one
# actually runs the orchestrator with a live model and asserts the
# agents *did real work* -- >=1 run recorded, non-empty leaderboard,
# >=1 loop turn, no early-exit markers in the log (see the
# verify_run_did_work / verify_min_experiments helpers in
# dev/scripts/smoke-v04-e2e-common.sh).
#
# Runs the CHEAP config (sonnet for reasoning, haiku for execution,
# reduced turns) -- ~$0.50, ~10-15 min. Haiku-as-task-agent is *more*
# likely to produce the messy/short output that triggers the
# parse-drift and early-exit bugs, so it's the ideal canary. The
# full-fidelity REAL config (opus + 5 turns) is still run by the
# maintainer locally before tagging a release:
#   URIKA_SMOKE_REAL=1 bash dev/scripts/smoke-v04-e2e-open.sh
#
# Triggered nightly and on demand. Not on push (too slow, costs money
# per commit). Skipped on the public mirror via the `if:` guard -- it
# has no ANTHROPIC_API_KEY secret.

on:
  schedule:
    # 04:00 UTC daily
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-smoke
  cancel-in-progress: false

jobs:
  e2e-open:
    name: E2E smoke -- open mode (cheap config)
    if: github.repository == 'xkiwilabs/urika-dev'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e . pytest pytest-asyncio pyperclip

      - name: Install Claude Code CLI
        # The Agent SDK shells out to the `claude` CLI; the runner
        # needs it on PATH.
        run: npm install -g @anthropic-ai/claude-code

      - name: Run open-mode E2E smoke
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash dev/scripts/smoke-v04-e2e-open.sh --cleanup

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-logs
          path: dev/scripts/.smoke-logs/
          retention-days: 14
          if-no-files-found: ignore
