<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="reveal.css">
    <link rel="stylesheet" href="{{THEME_CSS}}">
    <style>
        /* Urika presentation overrides */
        :root {
            --urika-blue: #2563eb;
            --urika-accent: #3b82f6;
        }
        .reveal {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #1e293b;
        }

        /* ── Global typography — smaller, fits the slide ── */
        .reveal h1, .reveal h2 {
            color: #2563eb;
            font-weight: 600;
            text-transform: none;
        }
        .reveal h1 { font-size: 1.3em; margin-bottom: 0.3em; }
        .reveal h2 { font-size: 0.9em; margin-bottom: 0.4em; font-weight: 600; }
        .reveal ul, .reveal ol { font-size: 0.5em; line-height: 1.6; }
        .reveal p { font-size: 0.5em; line-height: 1.5; }
        .reveal li { margin-bottom: 0.3em; }

        /* ── Overflow protection — content MUST fit ── */
        .reveal .slides > section {
            overflow: hidden;
            padding: 30px 50px;
            box-sizing: border-box;
        }

        /* ── Content slide headings ── */
        .reveal section h2 {
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.2em;
            margin-bottom: 0.5em;
        }

        /* ── Title slide ── */
        .title-slide {
            text-align: center;
        }
        .title-slide h1 {
            font-size: 1.8em;
            margin-bottom: 0.1em;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .title-slide .subtitle {
            font-size: 0.6em;
            color: #64748b;
            font-weight: 300;
        }
        .title-slide::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            margin: 0.5em auto 0;
            border-radius: 2px;
        }

        /* ── Figure slides — larger images ── */
        .slide-figure { text-align: center; }
        .slide-figure img {
            max-width: 70%;
            max-height: 55vh;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: block;
            margin: 0 auto;
        }
        .slide-figure .caption { font-size: 0.45em; color: #64748b; font-style: italic; }

        /* ── Two-column layout — proper sizing ── */
        .slide-two-col .columns {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        .slide-two-col .col-figure {
            flex: 1;
            text-align: center;
        }
        .slide-two-col .col-figure img {
            max-width: 100%;
            max-height: 45vh;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .slide-two-col .col-text { flex: 1; }
        .slide-two-col .col-text ul { font-size: 0.5em; }
        .slide-two-col .caption { font-size: 0.4em; color: #64748b; font-style: italic; }
        .slide-two-col .bottom-text { text-align: center; font-size: 0.5em; color: #475569; }

        /* ── Stat slides — cleaner ── */
        .slide-stat { text-align: center; }
        .slide-stat .big-number {
            font-size: 3.5em;
            font-weight: 800;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0.15em 0;
            line-height: 1.1;
        }
        .slide-stat .stat-label { font-size: 0.7em; color: #64748b; }
        .slide-stat ul { text-align: center; list-style: none; }

        /* ── Slide footer ── */
        .slide-footer {
            position: absolute;
            bottom: 12px;
            left: 40px;
            right: 40px;
            font-size: 0.35em;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
        }

        /* ── Navigation arrows ── */
        .reveal .controls {
            color: var(--urika-blue);
        }

        /* ── Thumbnail strip at bottom ── */
        #thumb-strip {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 10px;
            overflow-x: auto;
            overflow-y: hidden;
            transition: height 0.25s ease, padding 0.25s ease;
        }
        #thumb-strip:hover, #thumb-strip.active {
            height: 60px;
            padding: 6px 10px;
        }
        .thumb-trigger {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 12px;
            z-index: 99;
        }
        .thumb-item {
            flex: 1 1 0;
            min-width: 40px;
            max-width: 120px;
            height: 48px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5em;
            color: #aaa;
            transition: border-color 0.15s, background 0.15s;
            position: relative;
        }
        .thumb-item:hover {
            border-color: var(--urika-blue);
            background: rgba(255,255,255,0.15);
        }
        .thumb-item.current {
            border-color: var(--urika-accent);
            background: rgba(37,99,235,0.2);
            color: white;
        }
        .thumb-item .thumb-num {
            font-weight: 600;
            font-size: 1.2em;
        }
        .thumb-item .thumb-title {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.9em;
            white-space: nowrap;
            display: none;
            z-index: 200;
            pointer-events: none;
        }
        .thumb-item:hover .thumb-title {
            display: block;
        }

        /* ── Urika branding ── */
        .urika-brand {
            position: fixed;
            bottom: 10px;
            left: 14px;
            font-size: 0.5em;
            color: var(--urika-accent);
            opacity: 0.35;
            z-index: 10;
        }
        .urika-brand .icon { margin-right: 3px; }

        /* ── Progress bar ── */
        .reveal .progress { color: var(--urika-blue); height: 3px; }

        /* ── Slide number ── */
        .reveal .slide-number {
            font-size: 0.5em;
            color: #999;
            right: 12px;
            bottom: 14px;
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            {{SLIDES_HTML}}
        </div>
        <div class="urika-brand">
            <span class="icon">&#10022;&#9670;&#10022;</span> Urika
        </div>
    </div>

    <!-- Thumbnail trigger zone and strip -->
    <div class="thumb-trigger" id="thumb-trigger"></div>
    <div id="thumb-strip"></div>

    <script src="reveal.min.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            progress: true,
            slideNumber: true,
            transition: 'fade',
            transitionSpeed: 'fast',
            width: 960,
            height: 700,
            margin: 0.04,
            center: true,
            controls: true,
            controlsLayout: 'edges',
            overview: true,
            touch: true,
            minScale: 0.1,
            maxScale: 1.5
        });

        // Build thumbnail strip + slide footers
        Reveal.on('ready', function() {
            var strip = document.getElementById('thumb-strip');
            var slides = document.querySelectorAll('.reveal .slides > section');
            var total = slides.length;
            slides.forEach(function(slide, i) {
                // Thumbnail item
                var thumb = document.createElement('div');
                thumb.className = 'thumb-item' + (i === 0 ? ' current' : '');

                var num = document.createElement('span');
                num.className = 'thumb-num';
                num.textContent = String(i + 1);
                thumb.appendChild(num);

                var titleEl = slide.querySelector('h1, h2');
                var tipText = titleEl ? titleEl.textContent : 'Slide ' + (i + 1);
                var tip = document.createElement('span');
                tip.className = 'thumb-title';
                tip.textContent = tipText;
                thumb.appendChild(tip);

                thumb.addEventListener('click', function() { Reveal.slide(i); });
                strip.appendChild(thumb);

                // Slide footer
                var footer = document.createElement('div');
                footer.className = 'slide-footer';
                var title = titleEl ? titleEl.textContent : '';
                footer.innerHTML = '<span>\u2726 Urika</span><span>' + title + '</span><span>' + (i+1) + ' / ' + total + '</span>';
                slide.appendChild(footer);
            });

            // Hover triggers
            document.getElementById('thumb-trigger').addEventListener('mouseenter', function() {
                strip.classList.add('active');
            });
            strip.addEventListener('mouseenter', function() {
                strip.classList.add('active');
            });
            strip.addEventListener('mouseleave', function() {
                strip.classList.remove('active');
            });
        });

        // Highlight current slide in strip
        Reveal.on('slidechanged', function(event) {
            var thumbs = document.querySelectorAll('.thumb-item');
            thumbs.forEach(function(t, i) {
                t.classList.toggle('current', i === event.indexh);
            });
        });
    </script>
</body>
</html>
