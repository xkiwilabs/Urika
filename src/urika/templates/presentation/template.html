<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="reveal.css">
    <link rel="stylesheet" href="{{THEME_CSS}}">
    <style>
        /* ═══════════════════════════════════════════════════════
           Urika Presentation — Viewport-Locked, No Scrolling
           ═══════════════════════════════════════════════════════ */

        :root {
            --u-blue: #2563eb;
            --u-accent: #3b82f6;
            --u-text: #1e293b;
            --u-muted: #64748b;
            --u-light: #94a3b8;
            --u-border: #e2e8f0;
            --u-bg: #f8fafc;
        }

        /* ── Reset reveal.js defaults that cause overflow ── */
        .reveal {
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-size: clamp(12px, 2vw, 15px) !important;
            color: var(--u-text);
        }
        .reveal .slides {
            text-align: left;
        }
        .reveal .slides > section {
            padding: 40px 50px 50px;
            box-sizing: border-box;
            overflow: hidden;
            height: 100%;
            max-height: 100%;
            display: flex !important;
            flex-direction: column;
        }

        /* ── Typography — clamp() for responsive scaling ── */
        .reveal h1 {
            font-size: clamp(22px, 3.5vw, 28px);
            font-weight: 700;
            color: var(--u-blue);
            text-transform: none;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
            flex-shrink: 0;
        }
        .reveal h2 {
            font-size: clamp(18px, 2.8vw, 22px);
            font-weight: 600;
            color: var(--u-blue);
            text-transform: none;
            margin: 0 0 16px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--u-border);
            flex-shrink: 0;
        }
        .reveal ul, .reveal ol {
            font-size: clamp(12px, 2vw, 15px);
            line-height: 1.6;
            margin: 0;
            padding-left: 1.2em;
            flex: 1;
            overflow: hidden;
        }
        .reveal li {
            margin-bottom: 6px;
            color: var(--u-text);
        }
        .reveal p {
            font-size: clamp(12px, 2vw, 15px);
            line-height: 1.6;
            margin: 0 0 8px 0;
            color: var(--u-text);
        }

        /* ── Title slide ── */
        .title-slide {
            text-align: center !important;
            justify-content: center !important;
            align-items: center !important;
        }
        .title-slide h1 {
            font-size: clamp(28px, 4.5vw, 36px);
            font-weight: 800;
            color: var(--u-accent);
            margin-bottom: 4px;
            border: none;
        }
        .title-slide .subtitle {
            font-size: clamp(13px, 2vw, 16px);
            color: var(--u-muted);
            font-weight: 400;
            margin-top: 12px;
        }
        .title-slide::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--u-accent);
            margin: 20px auto 0;
            border-radius: 2px;
        }

        /* ── Bullet slides — content fills ~70% for breathing room ── */
        .reveal section ul {
            max-height: 70%;
        }

        /* ── Figure slides ── */
        .slide-figure {
            text-align: center !important;
            align-items: center !important;
        }
        .slide-figure img {
            max-width: 85%;
            max-height: 55%;
            border-radius: 6px;
            border: 1px solid var(--u-border);
            display: block;
            margin: 8px auto;
            object-fit: contain;
        }
        .slide-figure .caption {
            font-size: clamp(10px, 1.5vw, 12px);
            color: var(--u-muted);
            font-style: italic;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .slide-figure ul {
            font-size: clamp(10px, 1.5vw, 13px);
            text-align: left;
            max-width: 80%;
            margin: 8px auto 0;
            flex: 0 1 auto;
            overflow: hidden;
        }

        /* ── Two-column layout ── */
        .slide-two-col .columns {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            flex: 1;
            overflow: hidden;
        }
        .slide-two-col .col-figure {
            flex: 1.2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .slide-two-col .col-figure img {
            max-width: 100%;
            max-height: 65%;
            border-radius: 6px;
            border: 1px solid var(--u-border);
            object-fit: contain;
        }
        .slide-two-col .col-text {
            flex: 0.8;
            overflow: hidden;
        }
        .slide-two-col .col-text ul {
            font-size: clamp(11px, 1.8vw, 13px);
        }
        .slide-two-col .caption {
            font-size: clamp(10px, 1.5vw, 11px);
            color: var(--u-muted);
            font-style: italic;
            margin-top: 4px;
        }
        .slide-two-col .bottom-text {
            text-align: center;
            font-size: clamp(10px, 1.5vw, 13px);
            color: var(--u-muted);
            margin-top: 8px;
            flex-shrink: 0;
        }

        /* ── Stat slides ── */
        .slide-stat {
            text-align: center !important;
            justify-content: center !important;
            align-items: center !important;
        }
        .slide-stat .big-number {
            font-size: clamp(48px, 9vw, 72px);
            font-weight: 800;
            color: var(--u-accent);
            margin: 8px 0;
            line-height: 1;
        }
        .slide-stat .stat-label {
            font-size: clamp(13px, 2vw, 16px);
            color: var(--u-muted);
            font-weight: 400;
        }
        .slide-stat ul {
            text-align: center;
            list-style: none;
            padding: 0;
            font-size: clamp(12px, 2vw, 14px);
            margin-top: 12px;
        }

        /* ── Slide footer ── */
        .slide-footer {
            position: absolute;
            bottom: 10px;
            left: 50px;
            right: 50px;
            font-size: 10px;
            color: var(--u-light);
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--u-border);
            padding-top: 6px;
        }

        /* ── Navigation ── */
        .reveal .controls { color: var(--u-blue); }
        .reveal .progress { color: var(--u-blue); height: 2px; }
        .reveal .slide-number {
            font-size: 11px;
            color: var(--u-light);
            right: 14px;
            bottom: 14px;
            display: none; /* using footer instead */
        }

        /* ── Thumbnail strip ── */
        #thumb-strip {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 0;
            background: rgba(15, 23, 42, 0.92);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 0 8px;
            overflow-x: auto;
            overflow-y: hidden;
            transition: height 0.2s ease, padding 0.2s ease;
        }
        #thumb-strip:hover, #thumb-strip.active {
            height: 50px;
            padding: 5px 8px;
        }
        .thumb-trigger {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 10px;
            z-index: 99;
        }
        .thumb-item {
            flex: 1 1 0;
            min-width: 32px;
            max-width: 80px;
            height: 38px;
            background: rgba(255,255,255,0.06);
            border: 1px solid transparent;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #94a3b8;
            transition: all 0.15s;
        }
        .thumb-item:hover {
            border-color: var(--u-accent);
            background: rgba(255,255,255,0.1);
        }
        .thumb-item.current {
            border-color: var(--u-accent);
            background: rgba(37,99,235,0.15);
            color: white;
        }
        .thumb-item .thumb-num {
            font-weight: 600;
        }
        .thumb-item .thumb-title {
            position: fixed;
            bottom: 56px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            white-space: nowrap;
            display: none;
            z-index: 200;
            pointer-events: none;
        }
        .thumb-item:hover .thumb-title { display: block; }

        /* ── Urika brand ── */
        .urika-brand { display: none; } /* using footer instead */
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            {{SLIDES_HTML}}
        </div>
    </div>

    <div class="thumb-trigger" id="thumb-trigger"></div>
    <div id="thumb-strip"></div>

    <script src="reveal.min.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            progress: true,
            slideNumber: false,
            transition: 'fade',
            transitionSpeed: 'fast',
            width: 960,
            height: 700,
            margin: 0.02,
            center: false,
            controls: true,
            controlsLayout: 'edges',
            overview: true,
            touch: true,
            minScale: 0.1,
            maxScale: 1.5
        });

        Reveal.on('ready', function() {
            var strip = document.getElementById('thumb-strip');
            var slides = document.querySelectorAll('.reveal .slides > section');
            var total = slides.length;
            slides.forEach(function(slide, i) {
                var thumb = document.createElement('div');
                thumb.className = 'thumb-item' + (i === 0 ? ' current' : '');
                var num = document.createElement('span');
                num.className = 'thumb-num';
                num.textContent = String(i + 1);
                thumb.appendChild(num);
                var titleEl = slide.querySelector('h1, h2');
                var tipText = titleEl ? titleEl.textContent : 'Slide ' + (i + 1);
                var tip = document.createElement('span');
                tip.className = 'thumb-title';
                tip.textContent = tipText;
                thumb.appendChild(tip);
                thumb.addEventListener('click', function() { Reveal.slide(i); });
                strip.appendChild(thumb);

                // Slide footer
                if (!slide.classList.contains('title-slide')) {
                    var footer = document.createElement('div');
                    footer.className = 'slide-footer';
                    footer.innerHTML = '<span>Urika</span><span>' + (i+1) + ' / ' + total + '</span>';
                    slide.appendChild(footer);
                }
            });

            document.getElementById('thumb-trigger').addEventListener('mouseenter', function() {
                strip.classList.add('active');
            });
            strip.addEventListener('mouseenter', function() { strip.classList.add('active'); });
            strip.addEventListener('mouseleave', function() { strip.classList.remove('active'); });
        });

        Reveal.on('slidechanged', function(event) {
            document.querySelectorAll('.thumb-item').forEach(function(t, i) {
                t.classList.toggle('current', i === event.indexh);
            });
        });
    </script>
</body>
</html>
