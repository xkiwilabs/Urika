<!DOCTYPE html>
<html lang="en" data-theme="{{ theme | default('dark') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Urika{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
  <script src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js" defer></script>
  {% block extra_head %}{% endblock %}
</head>
<body
  x-data="{ theme: localStorage.getItem('urika-theme') || 'dark' }"
  x-init="
    document.documentElement.dataset.theme = theme;
    document.addEventListener('urika:toggle-theme', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('urika-theme', theme);
      document.documentElement.dataset.theme = theme;
    });
  "
  :data-theme="theme"
>
  <div class="app-shell">
    {% include '_sidebar.html' %}
    <main class="main">
      <header class="page-header">
        {% block breadcrumb %}{% endblock %}
        <h1 class="page-title">{% block heading %}{% endblock %}</h1>
      </header>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
