[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "urika"
version = "0.1.0"
description = "Multi-agent scientific analysis platform"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "click>=8.0",
    "numpy>=1.24",
    "pandas>=2.0",
    "prompt-toolkit>=3.0",
    "scikit-learn>=1.3",
    "scipy>=1.11",
]

[project.optional-dependencies]
agents = [
    "claude-agent-sdk>=0.1",
]
viz = [
    "matplotlib>=3.7",
    "seaborn>=0.13",
]
ml = [
    "xgboost>=2.0",
    "lightgbm>=4.0",
]
dl = [
    "torch>=2.0",
    "transformers>=4.30",
]
knowledge = [
    "pypdf>=4.0",
]
all = [
    "claude-agent-sdk>=0.1",
    "matplotlib>=3.7",
    "seaborn>=0.13",
    "xgboost>=2.0",
    "lightgbm>=4.0",
    "torch>=2.0",
    "transformers>=4.30",
    "pypdf>=4.0",
]
dev = [
    "pypdf>=4.0",
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.1",
]

[project.scripts]
urika = "urika.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/urika"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py311"
src = ["src"]
